name: Build release zip

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build:
    name: Build release zip
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          composer install

      - name: Generate autoloader
        run: composer dump-autoload -oa --no-dev

      - name: Run PHPStan analyse
        run: vendor/bin/phpstan analyse

      - name: PHP Compatibility check
        run: vendor/bin/phpcs -p src --standard=PHPCompatibilityWP

      - name: Run WordPress Coding Standard fixes
        run: vendor/bin/phpcbf --standard=ruleset.xml .

      - uses: anchore/sbom-action@v0

      - name: ZIP plugin
        run: |
          cd ..
          zip -r -q ${{ github.event.repository.name }}.zip ${{ github.event.repository.name }}/* -x "*/.git/*" "*/.github/*" "*/changelog.md" "*/phpstan.neon" "*/ruleset.xml" "*/composer.lock" "*/readme.md" "*/.gitignore" "*/vendor/*"
          zip -u -q ${{ github.event.repository.name }}.zip ${{ github.event.repository.name }}/vendor/composer/*
          cp ${{ github.event.repository.name }}.zip ${{ github.event.repository.name }}/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: ${{ github.event.repository.name }}.zip