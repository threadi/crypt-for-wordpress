name: Build release zip

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build:
    name: Build release zip
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build plugin
        run: |
          composer install --no-dev

      - name: ZIP plugin
        run: |
          cd ..
          zip -r -q ${{ github.event.repository.name }}.zip ${{ github.event.repository.name }}/* -x "*/.git/*" "*/.github/*" "*/ruleset.xml" "*/composer.lock" "*/readme.md" "*/.gitignore" "*/vendor/*"
          zip -u -q ${{ github.event.repository.name }}.zip ${{ github.event.repository.name }}/vendor/composer/*
          cp ${{ github.event.repository.name }}.zip ${{ github.event.repository.name }}/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: ${{ github.event.repository.name }}.zip